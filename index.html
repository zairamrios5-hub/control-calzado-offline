<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Calzado - Offline First</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #FFFFFF;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #00FF88;
            font-size: 24px;
            text-align: center;
        }
        .card {
            background-color: #1E1E1E;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        button {
            background-color: #00FF88;
            color: #000000;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            width: 100%;
            cursor: pointer;
            margin-top: 15px;
        }
        button:active {
            background-color: #00CC6E;
        }
    </style>
</head>
<body>

    <h1>Control de Calzado (Tallas 9-17)</h1>
    
    <div class="card">
        <p style="text-align: center; font-size: 16px;">¡Tu entorno web Offline-First está listo para ser desarrollado!</p>
        <button onclick="alert('¡Pronto registrarás ventas aquí!')">Simular Registro</button>
    </div>

</body>
</html>
