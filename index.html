<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Inventario - Calzado Infantil</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1E1E1E;
            --primary: #00FF88;
            --text-color: #FFFFFF;
            --accent: #FFB300;
            --danger: #FF4444;
            --sabado-color: #00E5FF;
            --domingo-color: #E040FB;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            color: var(--primary);
            font-size: 22px;
            margin: 5px 0;
        }
        .status-badge {
            background-color: #2e2e2e;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            border: 1px solid #444;
        }
        .online { color: var(--primary); }
        .offline { color: var(--danger); }
        
        .container {
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: var(--accent);
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .category-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 2px solid #333;
            padding: 15px 10px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
        }
        .category-btn.active {
            border-color: var(--primary);
            background-color: #153325;
        }

        .form-group {
            background-color: var(--card-bg);
            border: 2px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .input-text {
            width: 100%;
            padding: 12px;
            background-color: #2A2A2A;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        
        .tallas-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-bottom: 15px;
        }
        .talla-btn {
            background-color: #2A2A2A;
            color: white;
            border: 1px solid #444;
            padding: 10px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
        .talla-btn.active {
            background-color: var(--accent);
            color: black;
            border-color: var(--accent);
        }
        .talla-btn.hidden { display: none; }

        .btn-register {
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
        }
        .btn-register:active { background-color: #00CC6E; }

        /* Apartados de Visualización por Día */
        .day-section {
            background-color: var(--card-bg);
            border: 2px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }
        .day-header {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid #444;
            display: flex;
            justify-content: space-between;
        }
        .sabado-header { color: var(--sabado-color); border-color: var(--sabado-color); }
        .domingo-header { color: var(--domingo-color); border-color: var(--domingo-color); }
        
        .log-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 180px;
            overflow-y: auto;
        }
        .log-item {
            padding: 8px 0;
            border-bottom: 1px solid #2A2A2A;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
        
        .btn-clear {
            background-color: #2A1414;
            color: var(--danger);
            border: 2px solid var(--danger);
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
            margin-top: 25px;
            margin-bottom: 30px;
        }
        .btn-clear:active {
            background-color: var(--danger);
            color: #000;
        }
    </style>
</head>
<body>

    <header>
        <h1>Control de Ventas</h1>
        <div class="status-badge">Estado de Red: <span id="network-status" class="online">● Conectado</span></div>
    </header>

    <div class="container">
        <label>1. SELECCIONA LA CATEGORÍA:</label>
        <div class="category-grid">
            <button class="category-btn" onclick="selectCategory('Cunero', this)">👶 Cunero</button>
            <button class="category-btn" onclick="selectCategory('Huarache Pequeño', this)">🩴 Huarache Pq.</button>
            <button class="category-btn" onclick="selectCategory('Zapato Pequeño', this)">👞 Zapato Pq.</button>
            <button class="category-btn" onclick="selectCategory('Tenis', this)">👟 Tenis Pq.</button>
            <button class="category-btn" onclick="selectCategory('Valeriana', this)">🩰 Valeriana</button>
            <button class="category-btn" onclick="selectCategory('Zapato Grande', this)">👞 Zapato Gde.</button>
            <button class="category-btn" onclick="selectCategory('Huarache Grande', this)">🩴 Huarache Gd.</button>
            <button class="category-btn" onclick="selectCategory('Tenis Grande', this)">👟 Tenis Gde.</button>
        </div>

        <div class="form-group">
            <label for="modelo">2. MODELO / DESCRIPCIÓN:</label>
            <input type="text" id="modelo" class="input-text" placeholder="Ej. Modelo Moño, Abejita, Spiter...">

            <label id="tallas-label">3. SELECCIONA LA TALLA:</label>
            <div class="tallas-grid" id="tallas-container">
                <button class="talla-btn" data-talla="9" onclick="selectTalla('9', this)">9</button>
                <button class="talla-btn" data-talla="10" onclick="selectTalla('10', this)">10</button>
                <button class="talla-btn" data-talla="11" onclick="selectTalla('11', this)">11</button>
                <button class="talla-btn" data-talla="12" onclick="selectTalla('12', this)">12</button>
                <button class="talla-btn" data-talla="13" onclick="selectTalla('13', this)">13</button>
                <button class="talla-btn" data-talla="14" onclick="selectTalla('14', this)">14</button>
                <button class="talla-btn" data-talla="15" onclick="selectTalla('15', this)">15</button>
                <button class="talla-btn" data-talla="16" onclick="selectTalla('16', this)">16</button>
                <button class="talla-btn" data-talla="17" onclick="selectTalla('17', this)">17</button>
                <button class="talla-btn" data-talla="18" onclick="selectTalla('18', this)">18</button>
            </div>

            <button class="btn-register" onclick="registrarVenta()">📝 Registrar Venta (Local)</button>
        </div>

        <div class="day-section">
            <div class="day-header sabado-header">
                <span>🗓️ VENTAS DEL SÁBADO</span>
                <span id="total-sabado">0 pares</span>
            </div>
            <ul id="list-sabado" class="log-list">
                </ul>
        </div>

        <div class="day-section">
            <div class="day-header domingo-header">
                <span>🗓️ VENTAS DEL DOMINGO</span>
                <span id="total-domingo">0 pares</span>
            </div>
            <ul id="list-domingo" class="log-list">
                </ul>
        </div>
        
        <button class="btn-clear" onclick="borrarVentasSemanales()">🗑️ Borrar Todo e Iniciar Nueva Semana</button>
    </div>

    <script>
        let categoriaSeleccionada = "";
        let tallaSeleccionada = "";

        const mapaTallas = {
            'Cunero': ['9', '10', '11', '12'],
            'Huarache Pequeño': ['10', '11', '12'],
            'Zapato Pequeño': ['10', '11', '12'],
            'Tenis': ['12', '13', '14', '15'],
            'Valeriana': ['12', '13', '14', '15'],
            'Zapato Grande': ['13', '14', '15'],
            'Huarache Grande': ['13', '14', '15', '16', '17'],
            'Tenis Grande': ['13', '14', '15', '16', '17', '18']
        };

        function actualizarEstadoRed() {
            const statusBadge = document.getElementById('network-status');
            if (navigator.onLine) {
                statusBadge.textContent = "● Conectado";
                statusBadge.className = "online";
            } else {
                statusBadge.textContent = "● Fuera de línea (Guardando en Celular)";
                statusBadge.className = "offline";
            }
        }
        window.addEventListener('online', actualizarEstadoRed);
        window.addEventListener('offline', actualizarEstadoRed);
        actualizarEstadoRed();

        function selectCategory(category, element) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            categoriaSeleccionada = category;

            tallaSeleccionada = "";
            document.querySelectorAll('.talla-btn').forEach(btn => btn.classList.remove('active'));

            const tallasPermitidas = mapaTallas[category] || [];
            document.querySelectorAll('.talla-btn').forEach(btn => {
                const t = btn.getAttribute('data-talla');
                if (tallasPermitidas.includes(t)) {
                    btn.classList.remove('hidden');
                } else {
                    btn.classList.add('hidden');
                }
            });
        }

        function selectTalla(talla, element) {
            document.querySelectorAll('.talla-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            tallaSeleccionada = talla;
        }

        function registrarVenta() {
            const modeloInput = document.getElementById('modelo');
            const modelo = modeloInput.value.trim();

            if (!categoriaSeleccionada || !modelo || !tallaSeleccionada) {
                alert("Por favor completa: Categoría, Modelo y Talla.");
                return;
            }

            // DETECTAR EL DÍA REAL: Si hoy es domingo guardará como "Domingo", de lo contrario por defecto va a "Sábado" (ideal para el tianguis)
            const numeroDia = new Date().getDay(); 
            const diaRegistro = (numeroDia === 0) ? "Domingo" : "Sábado";

            const venta = {
                categoria: categoriaSeleccionada,
                modelo: modelo,
                talla: tallaSeleccionada,
                dia: diaRegistro,
                hora: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            let ventasActuales = JSON.parse(localStorage.getItem('ventas_tianguis')) || [];
            ventasActuales.push(venta);
            localStorage.setItem('ventas_tianguis', JSON.stringify(ventasActuales));

            modeloInput.value = "";
            document.querySelectorAll('.talla-btn').forEach(btn => btn.classList.remove('active'));
            tallaSeleccionada = "";
            
            cargarVentasLocales();
        }

        function cargarVentasLocales() {
            const listSabado = document.getElementById('list-sabado');
            const listDomingo = document.getElementById('list-domingo');
            
            listSabado.innerHTML = "";
            listDomingo.innerHTML = "";
            
            let ventasActuales = JSON.parse(localStorage.getItem('ventas_tianguis')) || [];
            
            let countSabado = 0;
            let countDomingo = 0;

            // Recorrer al revés para mostrar lo más nuevo arriba
            ventasActuales.slice().reverse().forEach(v => {
                const li = document.createElement('li');
                li.className = "log-item";
                li.innerHTML = `<span><strong>[${v.categoria}]</strong> ${v.modelo} - T. ${v.talla}</span> <span style="color:#888;">${v.hora}</span>`;
                
                if (v.dia === "Sábado") {
                    listSabado.appendChild(li);
                    countSabado++;
                } else {
                    listDomingo.appendChild(li);
                    countDomingo++;
                }
            });

            // Mostrar mensajes si están vacíos
            if (countSabado === 0) listSabado.innerHTML = `<li class="log-item" style="color:#666; justify-content:center;">Sin ventas registradas este sábado.</li>`;
            if (countDomingo === 0) listDomingo.innerHTML = `<li class="log-item" style="color:#666; justify-content:center;">Sin ventas registradas este domingo.</li>`;

            // Actualizar contadores totales de pares vendidos
            document.getElementById('total-sabado').textContent = `${countSabado} ${countSabado === 1 ? 'par' : 'pares'}`;
            document.getElementById('total-domingo').textContent = `${countDomingo} ${countDomingo === 1 ? 'par' : 'pares'}`;
        }

        function borrarVentasSemanales() {
            const respuesta = confirm("⚠️ ¿Estás seguro de borrar todo? Esto eliminará el registro de Sábado y Domingo para iniciar una nueva semana de ventas.");
            if (respuesta) {
                localStorage.removeItem('ventas_tianguis');
                cargarVentasLocales();
                alert("¡Registros borrados con éxito! Pantalla en ceros para la próxima semana.");
            }
        }

        window.onload = cargarVentasLocales;
    </script>
</body>
</html>
